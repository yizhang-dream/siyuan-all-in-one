name: Bug report
description: Report a problem with the SiYuan All-in-One plugin.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please avoid pasting API keys or private note content.
  - type: input
    id: siyuan-version
    attributes:
      label: SiYuan version
      placeholder: "e.g. 3.6.5"
    validations:
      required: true
  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      placeholder: "e.g. 1.0.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Docker/browser
        - Other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Include the exact workflow, expected behavior, and actual behavior.
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Paste the plugin Diagnostics report or relevant command output. Redact private content.
      render: json
  - type: textarea
    id: notes
    attributes:
      label: Additional notes

